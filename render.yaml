services:
  - type: web
    name: blogging-api
    runtime: docker
    plan: free
    dockerContext: ./System/System
    dockerfilePath: ./System/System/Dockerfile
    healthCheckPath: /posts
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
